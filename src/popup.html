<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MirAI Recorder</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    .top-right {
      position: absolute;
      top: 6px;
      right: 6px;
    }
    .top-right .small {
      font-size: 10px;
      padding: 2px 6px;
    }
    .rec-row {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding-left: 6px
    }
  </style>
</head>
<body>
  <div id="dm-update-banner" style="display:none;background:#fff3cd;color:#856404;padding:6px 10px;font-size:11px;border-bottom:1px solid #ffc107;text-align:center;">
    <strong>Mise a jour disponible :</strong>
    <span id="dm-update-version"></span>
    <a id="dm-update-link" href="#" target="_blank" style="margin-left:6px;color:#0072cf;text-decoration:underline;">Telecharger</a>
    <span id="dm-update-dismiss" style="cursor:pointer;margin-left:8px;font-weight:bold;" title="Fermer">&times;</span>
  </div>
  <div class="container" style="position: relative;">

    <div class="url-row">
      <div id="fav" title="Bookmark this URL" class="fav">☆</div>
      <div id="current-url" class="url">--</div>
    </div>
    <div class="rec-row">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <button id="rec-btn" class="rec-btn" aria-pressed="false"><span id="rec-light" class="rec-light"></span></button>
        <div id="timer" style="text-align:center;font-size:12px;color:#333;margin-top:4px;">00:00</div>
      </div>
      <div class="status">
        <div id="status-line">Idle <img id="loader" src="mirai_loader.gif" alt="loading" style="display:none;vertical-align:middle;width:18px;height:18px;margin-left:6px"></div>
        <div id="manual-entry" style="margin-top:8px;font-size:11px;">
          <label for="platform-select">Plateforme :</label>
          <select id="platform-select" style="margin-left:4px;">
            <option value="webconf">Webconf</option>
            <option value="comu">Comu</option>
            <option value="webinaire">Webinaire</option>
            <option value="webex">Webex</option>
            <option value="gmeet">Google Meet</option>
            <option value="teams">Microsoft Teams</option>
          </select>
        
          <div style="margin-top:6px;">
            <label for="manual-login">Identifiant :</label><br>
            <input type="text" id="manual-login" placeholder="email ou identifiant"
              style="width:95%;margin-top:2px;font-size:11px;">
          </div>
        
          <div style="margin-top:6px;">
            <label for="manual-password">Mot de passe :</label><br>
            <input type="password" id="manual-password" placeholder="mot de passe"
              style="width:95%;margin-top:2px;font-size:11px;">
          </div>
        </div>
                
        <div id="current-recording" style="font-size:11px;color:#444;margin-top:4px;"></div>
      </div>
    </div>
    <div class="controls"></div>
    <div class="tabs-block" style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #ddd;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div class="list-title">Onglets actifs (visio seulement):</div>
        <div id="refresh-tabs" style="cursor: pointer; text-decoration: underline; font-size: 11px; color: #0072cf;">
          Rafraîchir
        </div>
      </div>
      <ul id="tabs-list" class="tabs" style="margin-top: 6px;"></ul>
    </div>
    <div class="list-block" style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #ddd;">
      <div class="list-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Dernières conférences</span>
        <span id="clear-history" style="cursor:pointer;text-decoration:underline;font-size:11px;color:#0072cf;">
          Effacer
        </span>
      </div>
      <ul id="history-list" class="history" style="max-height:140px;overflow-y:auto;"></ul>
    </div>
  </div>
  
  <div class="shortcuts" style="display:flex;justify-content:space-around;align-items:center;font-size:11px;color:#0072cf;margin-top:10px;padding:4px 6px;border-top:1px solid #ddd;">
    <span id="shortcut-chat" style="cursor:pointer;text-decoration:underline;">MirAI Chat</span>
    <span id="shortcut-summary" style="cursor:pointer;text-decoration:underline;">Résumé</span>
    <span id="shortcut-report" style="cursor:pointer;text-decoration:underline;">Compte rendu</span>
    <span id="shortcut-comu" style="cursor:pointer;text-decoration:underline;">Comu</span>
    <span id="shortcut-help" style="cursor:pointer;text-decoration:underline;">Aide</span>
  </div>

  <footer id="footer"
    style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#666;border-top:1px solid #ccc;margin-top:6px;padding:4px 6px;">
    <div id="footer-message">Chargement...</div>
    <div style="display:flex;gap:10px;">
      <div id="show-overlay-btn" style="cursor:pointer;text-decoration:underline;font-size:11px;color:#0072cf;" title="Afficher le bouton REC sur la page">Overlay</div>
      <div id="relogin-btn" style="cursor:pointer;text-decoration:underline;font-size:11px;color:#0072cf;">Reconnecter</div>
    </div> 
 </footer>

  <script src="compat.js"></script>
  <script src="dm/bootstrap.js"></script>
  <script src="dm/telemetry.js"></script>
  <script src="crypto.js"></script>
  <script src="auth.js"></script>
  <script src="recording.js"></script>
  <script src="popup.js"></script>

</body>
</html>
